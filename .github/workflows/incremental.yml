name: Incremental 15m ingestion

on:
  schedule:
    - cron: "15 6 * * *" # daily at 06:15 UTC
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        # Python version comes from .python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run incremental ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # On failure, surface the tail of the output as a workflow annotation
        # so the error is visible without opening the raw logs.
        run: |
          set +e
          uv run python -m elt_btc.ingestion.incremental_15m 2>&1 | tee run.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            msg=$(tail -c 1200 run.log)
            msg="${msg//'%'/%25}"
            msg="${msg//$'\n'/%0A}"
            echo "::error title=incremental_15m failed::${msg}"
          fi
          exit "$code"
