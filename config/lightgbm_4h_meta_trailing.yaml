# Same model and labels as lightgbm_4h_meta.yaml; only the EXECUTION
# policy differs: while a trade is open, every model re-signal in the
# trade's direction ratchets TP and SL independently in the favorable
# direction (trailing stop can lock in profit).
dataset:
  parquet_root: data/raw/1m
  timeframe: 4h
  min_minutes_per_bar: 220

features:
  momentum_windows: [3, 6, 12, 24, 42, 84]
  vol_windows: [6, 18, 42]
  range_vol_windows: [6, 42]
  channel_windows: [18, 84]
  rsi_period: 14
  volume_windows: [6, 42]

target:
  type: meta_triple_barrier
  side_momentum_window: 12
  vol_span: 42
  pt_mult: 3.0
  sl_mult: 1.0
  max_holding: 42

split:
  n_splits: 8
  test_size: 1095
  min_train_size: 6570
  purge: 48

models:
  seed: 42

backtest:
  fee_bps: 10.0
  threshold_band: 0.0
  policy: trailing
