# Meta-labeling (Lopez de Prado): a primary momentum signal picks the trade
# side, triple barriers with the requested 3:1 payoff are set IN that
# direction (TP 3 sigma along the side, SL 1 sigma against it), and
# LightGBM learns whether the sided trade wins. The 0.5 threshold is the
# natural entry cutoff again, and the policy never fades the primary signal.
dataset:
  parquet_root: data/raw/1m
  timeframe: 4h
  min_minutes_per_bar: 220

features:
  momentum_windows: [3, 6, 12, 24, 42, 84]
  vol_windows: [6, 18, 42]
  range_vol_windows: [6, 42]
  channel_windows: [18, 84]
  rsi_period: 14
  volume_windows: [6, 42]

target:
  type: meta_triple_barrier
  side_momentum_window: 12   # primary signal: sign of the 2-day return
  vol_span: 42
  pt_mult: 3.0               # profit-take 3 sigma in the trade's direction
  sl_mult: 1.0               # stop-loss 1 sigma against it
  max_holding: 42

split:
  n_splits: 8
  test_size: 1095
  min_train_size: 6570
  purge: 48

models:
  seed: 42

backtest:
  fee_bps: 10.0
  threshold_band: 0.0
  policy: fixed      # barriers set at entry, held to exit
